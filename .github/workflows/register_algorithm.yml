name: Register Algorithm to APEx Catalogue

on:
  push:
    branches:
      - main
    paths:
      - 'algorithm_registration/**'

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout openeo-udp
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      # Detect changes on main between HEAD~1 and HEAD
      - name: Detect changed algorithm
        id: detect
        run: |
          ALG=$(git diff --name-only HEAD~1 HEAD -- algorithm_registration/ \ 
            | grep '^algorithm_registration/[^/]*/[^/]' \
            | awk -F'/' '{print $2}' \
            | sort -u \
            | head -1)
          if [ -z "$ALG" ]; then
            echo "No algorithm directory changes detected, skipping."
            exit 1
          fi
          echo "alg=$ALG" >> $GITHUB_OUTPUT
    
      # Pipeline below happens in developmentseed/apex_algorithms repo
      - name: Clone apex_algorithms repo
        uses: actions/checkout@v4
        with:
          repository: developmentseed/apex_algorithms
          path: apex_algorithms
          token: ${{ secrets.APEX_PAT }}
      
      - name: Create branch and copy records
        run: |
          cd apex_algorithms
          git checkout -b alg/${{ steps.detect.outputs.alg }}
          cp -r ../algorithm_registration/${{ steps.detect.outputs.alg }} algorithm_catalog/developmentseed
    
      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Run QA tests
        working-directory: apex_algorithms
        run: |
            uv pip install qa/tools -r qa/unittests/requirements.txt
            uv run pytest qa/unittests/tests/test_records.py

      - name: Push records to APEx algorithm repository
        run: |
          cd apex_algorithms
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add algorithm_catalog/developmentseed/${{ steps.detect.outputs.alg }}
          git commit -m "Add ${{ steps.detect.outputs.alg }} UDP"
          git remote add target https://x-access-token:${{ secrets.APEX_PAT }}@github.com/developmentseed/apex_algorithms.git
          git push target alg/${{ steps.detect.outputs.alg }}

